server:
  port: 8080

spring:
  application:
    name: aws-lab-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
     ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    properties:
     hibernate:
        format_sql: true
        
logging:
  level:
    com.zaxxer.hikari: DEBUG
